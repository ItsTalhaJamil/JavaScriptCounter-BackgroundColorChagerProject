<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Semantic Webpage</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <h2>Counter</h2>
        <p id="count">0</p>
        <button id="increaseBy1Btn">Increase by 1</button>
        <button id="increaseBy2Btn">Increase by 2</button>
        <button id="increaseBy5Btn">Increase by 5</button>
       <button id="increaseBy10Btn">Increase by 10</button>
        <button id="decreaseBy1Btn">Decrease by 1</button>
       <button id="decreaseBy2Btn">Decrease by 2</button>
        <button id="decreaseBy5Btn">Decrease by 5</button>
        <button id="decreaseBy10Btn">Decrease by 10</button>
      </section>

      <section>
        <h2>Change Background</h2>
        <button  id="colorBtn">Change Background Color</button>
      </section>
    </main>

    <footer>
      <p>© 2026 My Website | All Rights Reserved</p>
    </footer>

    <script src="script.js">
        
    </script>
  </body>
</html>
